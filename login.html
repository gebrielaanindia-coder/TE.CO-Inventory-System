<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | TE.CO Stock</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Bootstrap Icon -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <style>

:root{
  --red-deep:#8B0000;
  --red-core:#C0392B;
  --red-vivid:#E74C3C;
  --red-light:#FADBD8;
  --red-xlight:#FEF5F4;

  --gold:#D4A843;
  --gold-light:#F9EFD7;

  --cream:#FDF6EE;
  --white:#FFFFFF;

  --text-dark:#1A0A0A;
  --text-mid:#4A2020;
  --text-soft:#8B5E5E;

  --border:#EDD8D4;

  --shadow-sm:0 2px 8px rgba(139,0,0,.08);
  --shadow-md:0 6px 24px rgba(139,0,0,.12);
  --shadow-lg:0 12px 40px rgba(139,0,0,.16);

  --radius:18px;

  --transition:all .25s ease;
}

/*LOGIN PAGE*/
    #loginPage {
      display: none;
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--red-deep) 0%, #4A0A0A 40%, #1A0000 100%);
      z-index: 99999;
      align-items: center; justify-content: center;
    }
    #loginPage.show { display: flex; }
    #loginPage::before {
      content: '☕';
      position: absolute; font-size: 400px;
      opacity: .04; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
      position: relative; z-index: 1;
      animation: loginFadeIn .4s ease;
    }
    @keyframes loginFadeIn {
      from { opacity:0; transform: translateY(24px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .login-logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-logo .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--red-core), var(--red-deep));
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 30px; margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(192,57,43,.4);
    }
    .login-logo h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700;
      color: var(--text-dark); margin: 0;
    }
    .login-logo p { font-size: 13px; color: var(--text-soft); margin: 4px 0 0; }
    .login-input-group { margin-bottom: 16px; }
    .login-input-group label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--text-mid); text-transform: uppercase;
      letter-spacing: .4px; margin-bottom: 6px;
    }
    .login-input-wrapper {
      position: relative;
    }
    .login-input-wrapper i {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-soft); font-size: 15px;
    }
    .login-input {
      width: 100%;
      border: 1.5px solid var(--border);
      background: var(--cream);
      color: var(--text-dark);
      border-radius: 10px;
      padding: 11px 14px 11px 38px;
      font-size: 14px;
      transition: var(--transition);
      outline: none;
      font-family: 'DM Sans', sans-serif;
    }
    .login-input:focus {
      border-color: var(--red-core);
      box-shadow: 0 0 0 3px rgba(192,57,43,.12);
      background: var(--white);
    }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--red-core), var(--red-deep));
      color: #fff; border: none;
      padding: 13px; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      font-family: 'DM Sans', sans-serif;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn:hover { box-shadow: 0 8px 24px rgba(192,57,43,.4); transform: translateY(-1px); }
    .login-error {
      background: var(--red-light);
      color: var(--red-deep);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px; font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }

/*
   RESPONSIVE*/

@media(max-width:576px){

  .login-card{
    padding:34px 24px;
  }

  .brand h1{
    font-size:26px;
  }

}

  </style>
</head>
<body>
<!-- LOGIN PAGE -->
<div id="loginPage" class="show">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">☕</div>
      <h2>Coffee Stock Inventory</h2>
      <p>Silakan login untuk melanjutkan</p>
    </div>
    <div class="login-error" id="loginError">
      <i class="bi bi-exclamation-circle me-1"></i> Username atau password salah!
    </div>
    <div class="login-input-group">
      <label>Username</label>
      <div class="login-input-wrapper">
        <i class="bi bi-person"></i>
        <input type="text" class="login-input" id="loginUsername" placeholder="Masukkan username" autocomplete="username">
      </div>
    </div>
    <div class="login-input-group">
      <label>Password</label>
      <div class="login-input-wrapper">
        <i class="bi bi-lock"></i>
        <input type="password" class="login-input" id="loginPassword" placeholder="Masukkan password" autocomplete="current-password">
      </div>
    </div>
    <button class="login-btn" id="btnLogin">
      <i class="bi bi-box-arrow-in-right"></i> Masuk
    </button>
    <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-soft);">
      © 2026 Coffee Stock Inventory System
    </div>
  </div>
</div>


<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>



<script>

const CREDENTIALS = {
  username: 'admin te.co',
  password: 'teco_123'
};


/*CHECK LOGIN*/

function checkLogin(){

  return localStorage.getItem('csis_loggedIn') === 'true';

}


/*LOGIN*/

function doLogin(){

  const username =
    $('#loginUsername').val().trim();

  const password =
    $('#loginPassword').val();


  if(
    username === CREDENTIALS.username &&
    password === CREDENTIALS.password
  ){

    // simpan status login
    localStorage.setItem(
      'csis_loggedIn',
      'true'
    );

    // pindah ke dashboard/index
    window.location.href = 'index.html';

  } else {

    $('#loginError').addClass('show');

    $('#loginPassword').val('');

  }

}


/*EVENT LOGIN*/

$('#btnLogin').on('click', function(){

  doLogin();

});


$('#loginPassword').on('keydown', function(e){

  if(e.key === 'Enter'){

    doLogin();

  }

});


$('#loginUsername').on('keydown', function(e){

  if(e.key === 'Enter'){

    $('#loginPassword').focus();

  }

});


/*AUTO REDIRECT*/

$(function(){

  if(checkLogin()){

    window.location.href = 'index.html';

  }

});

</script>
</body>
</html>
